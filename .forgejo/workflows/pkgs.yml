name: Build jwmkit-neko package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: codeberg-small
    container:
      image: 'ghcr.io/void-linux/void-mklive:20250116R1'
      options: --privileged

    steps:
      # 1. Configurar entorno, instalar herramientas y crear usuario de compilación
      - name: Fix SSL and install tools
        run: |
          # Actualizar repositorios y el sistema
          xbps-install -Syu xbps
          xbps-install -Suyd
          
          # Instalar los paquetes necesarios (incluyendo sudo)
          xbps-install -y nodejs ca-certificates ntp git base-devel xtools sudo

          # Crear un usuario 'builder' sin contraseña
          useradd -m -s /bin/bash builder
          
          # Permitir que el usuario builder use sudo sin contraseña para las tareas de xbps-src
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      # 2. Clonar el código fuente
      - name: Checkout source code
        uses: actions/checkout@v4

      # 3. Clonar void-packages, copiar el template y ajustar permisos
      - name: Copy template
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          cd /tmp/void-packages
          git clone --depth 1 https://codeberg.org/javiercplus/protonup-qtvoid.git
          cp -rfv protonup-qtvoid/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/spicetify-void.git
          cp -rfv spicetify-void/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/STEAM-ALT-VOID.git
          cp -rfv STEAM-ALT-VOID/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/faugus-launcher-void.git
          cp -rfv faugus-launcher-void/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/portproton-void.git
          cp -rfv portproton-void/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/Windscribe-void.git
          cp -rfv Windscribe-void/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/ZerotierOne-Void-Linux.git
          cp -rfv ZerotierOne-Void-Linux/* srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/heroic-games.git
          cp -rfv heroic-games srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/brave-bin.git
          cp -rfv brave-bin srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-rolling.git
          cp -rfv linux-neko-rolling srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-rt.git
          cp -rfv linux-neko-rt srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-zen.git
          cp -rfv linux-neko-zen srcpkgs/
          git clone --depth 1 https://codeberg.org/javiercplus/waterfox.git
          cp -rfv waterfox srcpkgs/
          
          
          # Cambiar la propiedad del espacio de trabajo y de /tmp al usuario builder
          chown -R builder:builder /tmp/void-packages
          chown -R builder:builder ${{ github.workspace }}

      # 4. Construir el paquete como el usuario builder
      - name: Build package
        run: |
          # Ejecutar el proceso de compilación bajo el entorno del usuario builder
          su - builder -c "cd /tmp/void-packages && ./xbps-src binary-bootstrap"
          su - builder -c "cd /tmp/void-packages && ./xbps-src pkg jwmkit-neko"

      # 5. Recoger los binarios
      - name: Collect binaries
        run: |
          mkdir -p ${{ github.workspace }}/binpkgs
          # Se usa cp -r con permisos de root para asegurar el acceso a los paquetes generados
          if [ -d /tmp/void-packages/hostdir/binpkgs ]; then
            cp -r /tmp/void-packages/hostdir/binpkgs/* ${{ github.workspace }}/binpkgs/
          fi

      # 6. Subir artefactos
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: jwmkit-neko-packages
          path: ${{ github.workspace }}/binpkgs/**/*.xbps
          if-no-files-found: error
