name: Build BETA PKGS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    container:
      image: 'ghcr.io/void-linux/void-mklive:20250116R1'
      options: --privileged

    steps:
      # 1. Configurar entorno, instalar herramientas y crear usuario de compilación
      - name: Fix SSL and install tools
        run: |
          # Actualizar repositorios y el sistema
          xbps-install -Syu xbps
          xbps-install -Suyd
          
          # Instalar los paquetes necesarios (incluyendo sudo)
          xbps-install -y nodejs ca-certificates ntp git base-devel xtools sudo rsync openssh sshpass

          # Crear el grupo xbuilder y un usuario 'builder' asociado a él
          groupadd -f xbuilder
          useradd -m -s /bin/bash -G xbuilder builder
          
          # Permitir que el usuario builder use sudo sin contraseña para las tareas de xbps-src
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      # 2. Clonar el código fuente
      - name: Checkout source code
        uses: actions/checkout@v4

      # 3. Clonar void-packages, copiar los templates y ajustar permisos
      - name: Copy template
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          cd /tmp/void-packages
          
          git clone --depth 1 https://github.com/javiercplus/Neko-Update.git srcpkgs/Neko-Update


          #BUILDSTyLE NONE
          echo "#nnothing" >> common/build-style/none.sh
          # Cambiar la propiedad al usuario builder
          chown -R builder:builder /tmp/void-packages

      # 4. Construir los paquetes secuencialmente como el usuario builder
      - name: Build package
        run: |
          # Se añade la bandera -t para forzar el uso del backend sin namespaces en caso de conflictos adicionales
          su - builder -c "cd /tmp/void-packages && ./xbps-src binary-bootstrap"
          su - builder -c "cd /tmp/void-packages && ./xbps-src pkg Neko-Update"
        

      # Firmar paquetes e índice del repositorio
      - name: Sign packages and index
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          cd /tmp/void-packages/hostdir/binpkgs
          
          # Firmar cada paquete individualmente primero
          xbps-rindex --sign-pkg --privkey /tmp/privkey.pem *.xbps
          
          # Generar el índice del repositorio (crea el archivo repodata)
          xbps-rindex -a *.xbps
          
          # Firmar el índice recién construido
          xbps-rindex --sign --signedby "javierc" --privkey /tmp/privkey.pem .
          
          # Limpiar la clave privada
          rm /tmp/privkey.pem
    
      # Subir artefactos directamente desde el entorno de Void
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neko-packages
          path: /tmp/void-packages/hostdir/binpkgs/**/*.xbps
          if-no-files-found: error
