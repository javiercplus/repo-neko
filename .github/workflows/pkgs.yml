name: Build neko package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        package: [
          "heroic-games",
          "protonup-qt",
          "steam-nk",
          "spicetify",
          "faugus-launcher",
          "portproton",
          "windscribe-desktop",
          "zerotierone",
          "brave-bin",
          "linux-neko-rolling",
          "linux-neko-rt",
          "linux-neko-zen",
          "waterfox"
        ]
    container:
      image: 'ghcr.io/void-linux/void-mklive:20250116R1'
      options: --privileged

    steps:
      # 1. Configurar entorno, instalar herramientas y crear usuario de compilación
      - name: Fix SSL and install tools
        run: |
          xbps-install -Syu xbps
          xbps-install -Suyd
          xbps-install -y nodejs ca-certificates ntp git base-devel xtools sudo
          useradd -m -s /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      # 2. Clonar el código fuente
      - name: Checkout source code
        uses: actions/checkout@v4

      # 3. Clonar void-packages, copiar el template y ajustar permisos
      - name: Copy template
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          cd /tmp/void-packages
          
          case "${{ matrix.package }}" in
            "heroic-games")
              git clone --depth 1 https://codeberg.org/javiercplus/heroic-games.git srcpkgs/heroic-games ;;
            "protonup-qt")
              git clone --depth 1 https://codeberg.org/javiercplus/protonup-qtvoid.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "steam-nk")
              git clone --depth 1 https://codeberg.org/javiercplus/STEAM-ALT-VOID.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "spicetify")
              git clone --depth 1 https://codeberg.org/javiercplus/spicetify-void.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "faugus-launcher")
              git clone --depth 1 https://codeberg.org/javiercplus/faugus-launcher-void.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "portproton")
              git clone --depth 1 https://codeberg.org/javiercplus/portproton-void.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "windscribe-desktop")
              git clone --depth 1 https://codeberg.org/javiercplus/Windscribe-void.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "zerotierone")
              git clone --depth 1 https://codeberg.org/javiercplus/ZerotierOne-Void-Linux.git /tmp/repo && cp -rfv /tmp/repo/* srcpkgs/ ;;
            "brave-bin")
              git clone --depth 1 https://codeberg.org/javiercplus/brave-bin.git srcpkgs/brave-bin ;;
            "linux-neko-rolling")
              git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-rolling.git srcpkgs/linux-neko-rolling ;;
            "linux-neko-rt")
              git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-rt.git srcpkgs/linux-neko-rt ;;
            "linux-neko-zen")
              git clone --depth 1 https://codeberg.org/javiercplus/linux-neko-zen.git srcpkgs/linux-neko-zen ;;
            "waterfox")
              git clone --depth 1 https://codeberg.org/javiercplus/waterfox.git srcpkgs/waterfox ;;
          esac
          
          chown -R builder:builder /tmp/void-packages
          chown -R builder:builder ${{ github.workspace }}

      # 4. Construir el paquete asignado en la matriz
      - name: Build package
        run: |
          su - builder -c "cd /tmp/void-packages && ./xbps-src binary-bootstrap"
          su - builder -c "cd /tmp/void-packages && ./xbps-src pkg ${{ matrix.package }}"
          
      # 5. Recoger los binarios
      - name: Collect binaries
        run: |
          mkdir -p ${{ github.workspace }}/binpkgs
          if [ -d /tmp/void-packages/hostdir/binpkgs ]; then
            cp -r /tmp/void-packages/hostdir/binpkgs/* ${{ github.workspace }}/binpkgs/
          fi

      # 6. Subir artefactos
      - name: Upload artifacts
        uses: actions/artifacts@v4
        with:
          name: ${{ matrix.package }}-package
          path: ${{ github.workspace }}/binpkgs/**/*.xbps
          if-no-files-found: error