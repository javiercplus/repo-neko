name: Repo Updater

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    container:
      image: 'ghcr.io/void-linux/void-mklive:20250116R1'
      options: --privileged

    steps:
      - name: Fix SSL and install tools
        run: |
          xbps-install -Syu --repository=https://repo-de.voidlinux.org/current/ xbps
          xbps-install -Suyd --repository=https://repo-de.voidlinux.org/current/
          xbps-install -y --repository=https://repo-de.voidlinux.org/current/ wget nodejs ca-certificates ntp git base-devel xtools sudo rsync openssh sshpass python3 python3-pip tar
          
          python3 -m pip install -U "huggingface_hub[cli]" --break-system-packages
          
          groupadd -f xbuilder
          useradd -m -s /bin/bash -G xbuilder builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Clone void-packages and template
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          cd /tmp/void-packages
          # 2. Viajamos en el tiempo al commit donde todo estaba bien
          # git checkout e6db056
          git clone --depth 1 https://codeberg.org/javiercplus/linux-cachy-void.git srcpkgs/linux-cachy-void
          git clone --depth 1 https://codeberg.org/Neko-Void/linux-neko-zen.git srcpkgs/linux-neko-zen
          git clone --depth 1 https://codeberg.org/Neko-Void/zig-nk.git srcpkgs/zig-nk
          git clone --depth 1 https://github.com/javiercplus/ly-xbps.git srcpkgs/ly
          echo "#nnothing" >> common/build-style/none.sh
          chown -R builder:builder /tmp/void-packages

      - name: Download existing repo from SourceForge
        env:
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          mkdir -p /tmp/void-packages/hostdir/binpkgs
          cd /tmp/void-packages/hostdir/binpkgs
          sshpass -e rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ${SFTP_USER}@frs.sourceforge.net:/home/frs/project/neko-void/repo/ .
          
      - name: Fix permissions for builder
        run: chown -R builder:builder /tmp/void-packages
        
      - name: Build package
        run: |
          su - builder -c "cd /tmp/void-packages && ./xbps-src binary-bootstrap"
          # su - builder -c "cd /tmp/void-packages && ./xbps-src fetch linux-cachy-void"
          # su - builder -c "cd /tmp/void-packages && ./xbps-src pkg linux-cachy-void"
          # su - builder -c "cd /tmp/void-packages && ./xbps-src pkg linux-neko-zen"
          su - builder -c "cd /tmp/void-packages && ./xbps-src pkg zig-nk"
          su - builder -c "cd /tmp/void-packages && ./xbps-src pkg ly"
      - name: Sign packages and index
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          cd /tmp/void-packages/hostdir/binpkgs
          
          xbps-rindex --sign-pkg --privkey /tmp/privkey.pem *.xbps
          xbps-rindex -a *.xbps
          xbps-rindex --sign --signedby "javierc" --privkey /tmp/privkey.pem .
          
          rm /tmp/privkey.pem

      - name: Deploy to SourceForge
        env:
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          cd /tmp/void-packages/hostdir/binpkgs
          sshpass -e rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" . ${SFTP_USER}@frs.sourceforge.net:/home/frs/project/neko-void/repo/

      - name: Compress and upload to Hugging Face 
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/void-packages/hostdir/binpkgs
          VERSION=$(date +"%Y%m%d")
          tar -czvf /tmp/neko-packages.tar.gz .
          hf upload arepaconcafe/repo /tmp/neko-packages.tar.gz test-$VERSION.tar.gz --repo-type dataset --token $HF_TOKEN
